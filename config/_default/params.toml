description = '这是我的个人博客'

mainSections = ['post']

favicon = "img/favicon.png"

[author]
    name = 'Cyong'

[dateFormat]
    published = ":date_full"
    lastUpdated = ":date_full"
  
[sidebar]
    emoji = '🤨'
    subtitle = '神隐中......'
    avatar = 'img/avatar.png' 

[footer]
    since = 2026
    customText = ''

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 10 } },
    ]
    page = [{ type = "toc" }]

    [article]
    headingAnchor = false
    math          = false
    readingTime   = true

    [article.license]
        enabled = true
        default = "Licensed under CC BY-NC-SA 4.0"

